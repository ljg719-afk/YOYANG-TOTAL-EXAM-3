      <p>시험 운영 관리</p>
    </div>
    <div id="admContent"></div>
    <button class="btn btn-secondary" onclick="hideAdmin()">← 메인으로 돌아가기</button>
  </div>
</div>

<script>
let userName="";
let answers=new Array(TOTAL).fill(0);
let submitted=false;
let lastQ=0; // 마지막으로 풀던 문제 번호(0-기준)

function key(){return STORE_KEY+userName;}
function saveState(){
  try{localStorage.setItem(key(),JSON.stringify({answers:answers,submitted:submitted,lastQ:lastQ,time:new Date().toISOString()}));}catch(e){}
}

// ── 시험 시작 ──
function startExam(){
  const n=document.getElementById("nameInput").value.trim();
  if(!n){alert("이름을 입력해 주세요.");return}
  userName=n;

  const saved=localStorage.getItem(key());
  if(saved){
    let d;try{d=JSON.parse(saved);}catch(e){d=null;}
    if(d&&d.answers){ showResume(d); return; }
  }
  // 저장 기록 없음 → 새 시험
  answers=new Array(TOTAL).fill(0); submitted=false; lastQ=0;
  buildExam();
  go("examScreen");
  updateProgress();
}

// ── 이어풀기 안내 ──
function showResume(d){
  answers=Array.isArray(d.answers)?d.answers.slice():new Array(TOTAL).fill(0);
  while(answers.length<TOTAL)answers.push(0);
  submitted=!!d.submitted;
  lastQ=d.lastQ||0;
  const answered=answers.filter(a=>a>0).length;

  let h="";
  if(submitted){
    h+=`<div class="resume-box">`;
    h+=`<div class="big">📌 이전에 제출한 답안이 있습니다</div>`;
    h+=`<div class="sub">${userName}님은 이미 답안을 제출하셨습니다. (${answered} / ${TOTAL}문항 응답)<br>아래에서 원하시는 것을 선택하세요.</div>`;
    h+=`<button class="btn btn-primary btn-big" onclick="resumeToResult()">📊 결과 확인하기 (코드 입력)</button>`;
    h+=`<button class="btn btn-success btn-big" onclick="resumeContinue()">✏️ 시험으로 돌아가기 (답 고치기)</button>`;
    h+=`<button class="btn btn-secondary btn-big" onclick="resumeFresh()">🔄 처음부터 새로 시험 보기</button>`;
    h+=`</div>`;
  }else{
    h+=`<div class="resume-box">`;
    h+=`<div class="big">📌 풀던 시험이 저장되어 있습니다</div>`;
    h+=`<div class="sub">${userName}님이 풀던 시험이 있습니다. (${answered} / ${TOTAL}문항 응답)<br>이어서 풀거나, 처음부터 새로 시작할 수 있습니다.</div>`;
    h+=`<button class="btn btn-success btn-big" onclick="resumeContinue()">▶️ 이어서 풀기 (풀던 문제로 이동)</button>`;
    h+=`<button class="btn btn-secondary btn-big" onclick="resumeFresh()">🔄 처음부터 새로 시험 보기</button>`;
    h+=`</div>`;
  }
  h+=`<button class="btn btn-secondary" onclick="go('startScreen')" style="margin-top:6px">← 이름 다시 입력</button>`;
  document.getElementById("resumeBody").innerHTML=h;
  go("resumeScreen");
}

function resumeContinue(){
  submitted=false;
  buildExam();
  restoreSelections();
  saveState();
  go("examScreen");
  updateProgress();
  scrollToLast();
}
function resumeToResult(){ go("lockScreen"); }
function resumeFresh(){
  if(!confirm("저장된 답안을 모두 지우고 처음부터 새로 시험을 보시겠습니까?"))return;
  localStorage.removeItem(key());
  answers=new Array(TOTAL).fill(0); submitted=false; lastQ=0;
  buildExam();
  go("examScreen");
  updateProgress();
  window.scrollTo(0,0);
}

// ── 오작동 제출 후 시험으로 복귀 ──
function backToExam(){
  submitted=false;
  buildExam();
  restoreSelections();
  saveState();
  go("examScreen");
  updateProgress();
  scrollToLast();
}

function buildExam(){
  let h="";
  let si=0;
  Q.forEach((q,i)=>{
    if(si<SECS.length && (i+1)===SECS[si].s){
      h+=`<div class="section-title">${SECS[si].t}</div>`;
      si++;
    }
    h+=`<div class="q-card" id="q${i}">`;
    h+=`<span class="q-num">${i+1}번</span>`;
    h+=`<div class="q-text">${q.q}</div>`;
    h+=`<div class="opt-list">`;
    q.o.forEach((o,j)=>{
      h+=`<div class="opt-btn" data-q="${i}" data-o="${j+1}" onclick="selectOpt(this,${i},${j+1})">`;
      h+=`<span class="opt-circle">${C[j]}</span>`;
      h+=`<span>${o}</span></div>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById("examBody").innerHTML=h;
}

function restoreSelections(){
  answers.forEach((a,i)=>{
    if(a>0){
      const el=document.querySelector(`.opt-btn[data-q="${i}"][data-o="${a}"]`);
      if(el)el.classList.add("selected");
    }
  });
}

function scrollToLast(){
  const t=document.getElementById("q"+lastQ);
  if(t)t.scrollIntoView({behavior:"smooth",block:"center"});
}

function selectOpt(el,qi,oi){
  if(submitted)return;
  const opts=el.parentElement.children;
  for(let o of opts)o.classList.remove("selected");
  el.classList.add("selected");
  answers[qi]=oi;
  lastQ=qi;
  updateProgress();
  saveState();
}

function updateProgress(){
  const answered=answers.filter(a=>a>0).length;
  const pct=(answered/TOTAL*100).toFixed(0);
  document.getElementById("progBar").style.width=pct+"%";
  document.getElementById("progInfo").textContent=`${answered} / ${TOTAL} 문항 응답 완료`;
}

// ── 답안 제출 ──
function submitExam(){
  const answered=answers.filter(a=>a>0).length;
  const unanswered=TOTAL-answered;
  let msg=`총 ${TOTAL}문항 중 ${answered}문항 응답하셨습니다.`;
  if(unanswered>0)msg+=`\n미응답 ${unanswered}문항이 있습니다.`;
  msg+="\n\n제출하시겠습니까?\n(제출 후에도 '시험으로 돌아가기'로 답을 고칠 수 있습니다.)";
  if(!confirm(msg))return;

  submitted=true;
  saveState();
  go("lockScreen");
  document.getElementById("progBar").style.width="100%";
}

// ── 결과 잠금 해제 ──
function tryUnlock(){
  const code=document.getElementById("unlockInput").value.trim();
  if(code===UNLOCK_CODE){
    showResult();
  }else{
    document.getElementById("lockMsg").textContent="코드가 일치하지 않습니다. 다시 입력해 주세요.";
    document.getElementById("lockMsg").style.color="#ef4444";
  }
}

// ── 결과 표시 ──
function showResult(){
  go("resultScreen");

  let correct=0;
  answers.forEach((a,i)=>{if(a===ANS[i])correct++});
  const wrong=TOTAL-correct;
  const score=correct;            // 60점 만점 (문항당 1점)

  let h=`<div class="result-header">`;
  h+=`<div class="score-circle done">${score}<small>/ ${TOTAL}점</small></div>`;
  h+=`<p style="font-size:15px;color:#94a3b8;margin-top:4px">${userName}님의 시험 결과</p>`;
  h+=`<p style="font-size:17px;color:#e2e8f0;margin-top:10px;font-weight:800">총 ${TOTAL}문제 중 <span class="correct-mark">${correct}문제 정답</span> · <span class="wrong-mark">${wrong}문제 오답</span></p>`;
  h+=`<p style="font-size:14px;color:#94a3b8;margin-top:6px">점수: ${score}점 / ${TOTAL}점 만점</p>`;
  h+=`<div class="stat-row">`;
  h+=`<div class="stat-item"><div class="num correct-mark">${correct}</div><div class="lbl">맞은 문제</div></div>`;
  h+=`<div class="stat-item"><div class="num wrong-mark">${wrong}</div><div class="lbl">틀린 문제</div></div>`;
  h+=`<div class="stat-item"><div class="num" style="color:#60a5fa">${TOTAL}</div><div class="lbl">만점(점)</div></div>`;
  h+=`</div></div>`;

  // 학습 필터 (전체 / 틀린 문제 / 맞은 문제)
  h+=`<div class="filter-bar">`;
  h+=`<button id="fbtnAll" class="btn btn-primary" onclick="renderReview('all')">📋 전체<br>(${TOTAL}문제)</button>`;
  h+=`<button id="fbtnWrong" class="btn btn-secondary" onclick="renderReview('wrong')">❌ 틀린 문제<br>(${wrong}개)</button>`;
  h+=`<button id="fbtnCorrect" class="btn btn-secondary" onclick="renderReview('correct')">✅ 맞은 문제<br>(${correct}개)</button>`;
  h+=`</div>`;
  h+=`<div id="reviewBody"></div>`;

  h+=`<div style="padding:20px 0;text-align:center">`;
  h+=`<button class="btn btn-secondary btn-big" onclick="resetExam()" style="max-width:320px;margin:0 auto">🔄 처음부터 새로 풀기</button>`;
  h+=`</div>`;

  document.getElementById("resultScreen").innerHTML=h;
  renderReview('all');
  window.scrollTo(0,0);
}

// 문제 1개 복습 카드 생성
function renderOneQ(i){
  const q=Q[i], mine=answers[i], ans=ANS[i], isCorrect=mine===ans;
  const icon=mine===0?"⚠️":(isCorrect?"✅":"❌");
  let h=`<div class="r-q">`;
  h+=`<span class="q-num">${i+1}번 ${icon}</span>`;
  if(mine===0)h+=`<span class="unanswered-badge">미응답</span>`;
  h+=`<div class="q-text" style="margin-top:10px">${q.q}</div>`;
  q.o.forEach((o,j)=>{
    let cls="opt-row";
    if(j+1===ans)cls+=" is-answer";
    else if(j+1===mine && mine!==ans)cls+=" is-wrong";
    h+=`<div class="${cls}">${C[j]} ${o}</div>`;
  });
  h+=`<div class="explain-box"><b>💡 해설:</b> ${q.e}</div>`;
  h+=`</div>`;
  return h;
}

// 필터별 복습 목록 렌더링
function renderReview(mode){
  const map={all:"fbtnAll",wrong:"fbtnWrong",correct:"fbtnCorrect"};
  Object.keys(map).forEach(k=>{
    const b=document.getElementById(map[k]);
    if(b)b.className="btn "+(k===mode?"btn-primary":"btn-secondary");
  });
  let h="";
  SECS.forEach(sec=>{
    let block="";
    for(let i=sec.s-1;i<sec.e;i++){
      const isCorrect=answers[i]===ANS[i];
      if(mode==="wrong" && isCorrect)continue;
      if(mode==="correct" && !isCorrect)continue;
      block+=renderOneQ(i);
    }
    if(block)h+=`<div class="section-title">${sec.t}</div>`+block;
  });
  if(!h){
    const msg=mode==="wrong"?"🎉 틀린 문제가 없습니다!<br>모든 문제를 맞히셨습니다.":
              (mode==="correct"?"맞은 문제가 없습니다.":"표시할 문제가 없습니다.");
    h=`<div class="review-empty">${msg}</div>`;
  }
  document.getElementById("reviewBody").innerHTML=h;
}

function resetExam(){
  if(!confirm("저장된 결과를 삭제하고 처음부터 다시 풀겠습니까?"))return;
  localStorage.removeItem(key());
  location.reload();
}

// ── 화면 전환 ──
function go(id){
  ["startScreen","resumeScreen","examScreen","lockScreen","resultScreen","adminScreen"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// ── 관리자 모드 ──
function showAdmin(){
  const pw=prompt("관리자 비밀번호를 입력하세요:");
  if(pw!==ADMIN_PW){if(pw!==null)alert("비밀번호가 일치하지 않습니다.");return}
  go("adminScreen");

  let h="";
  h+=`<div class="adm-section"><h3>📋 시험 운영 가이드</h3>`;
  h+=`<div class="guide-step"><div class="guide-num">1</div><div class="guide-text"><b>시험 전</b> — index.html 파일을 GitHub Pages 또는 Netlify Drop에 업로드한 뒤, 생성된 링크를 카카오톡 단체방에 공유합니다.</div></div>`;
  h+=`<div class="guide-step"><div class="guide-num">2</div><div class="guide-text"><b>시험 중</b> — 교육생이 링크를 터치하여 이름 입력 후 응시합니다. 답을 고르면 자동 저장되며, 실수로 제출하거나 창을 닫아도 <b>'시험으로 돌아가기'</b>로 풀던 문제부터 이어서 풀 수 있습니다.</div></div>`;
  h+=`<div class="guide-step"><div class="guide-num">3</div><div class="guide-text"><b>시험 후</b> — 아래 카카오톡 안내 문구를 단체방에 전송합니다.</div></div>`;
  h+=`</div>`;

  h+=`<div class="adm-section"><h3>💬 카카오톡 발송 문구</h3>`;
  h+=`<p style="font-size:12px;color:#94a3b8;margin-bottom:8px">아래 문구를 복사하여 카카오톡에 붙여넣기 하세요</p>`;
  const k1=`📝 3차 종합 모의고사 안내\n\n아래 링크를 터치하여 시험에 응시해 주세요.\n이름을 입력하신 후 시험이 시작됩니다.\n\n⏰ 시험 시간: 제한 없음\n📌 총 60문항 (제5장~제7장 종합)\n✅ 60점 만점\n💡 실수로 제출해도 '시험으로 돌아가기'로 다시 풀 수 있습니다.\n\n👉 시험 링크: (여기에 링크 붙여넣기)`;
  h+=`<div class="kakao-msg" id="kakao1">${k1.replace(/\n/g,"<br>")}</div>`;
  h+=`<button class="copy-btn" onclick="copyText(document.getElementById('kakao1src').value)">📋 복사하기</button>`;
  h+=`<textarea id="kakao1src" style="display:none">${k1}</textarea>`;
  const k2=`✅ 시험이 종료되었습니다.\n\n결과확인 코드: ${UNLOCK_CODE}\n\n제출 화면에서 위 코드를 입력하면\n점수와 해설을 확인할 수 있습니다.\n\n총 60문제(60점 만점)로 채점됩니다.`;
  h+=`<div class="kakao-msg" id="kakao2" style="margin-top:16px">${k2.replace(/\n/g,"<br>")}</div>`;
  h+=`<button class="copy-btn" onclick="copyText(document.getElementById('kakao2src').value)">📋 복사하기</button>`;
  h+=`<textarea id="kakao2src" style="display:none">${k2}</textarea>`;
  h+=`</div>`;

  h+=`<div class="adm-section"><h3>⚙️ 문제 수정 방법</h3>`;
  h+=`<div class="guide-step"><div class="guide-num">1</div><div class="guide-text">index.html 파일을 <b>메모장</b> 또는 코드 편집기로 엽니다.</div></div>`;
  h+=`<div class="guide-step"><div class="guide-num">2</div><div class="guide-text">파일 상단 <b>CONFIG 영역</b>에서 비밀번호, 코드, 정답(ANS), 문제(Q)를 수정합니다.</div></div>`;
  h+=`<div class="guide-step"><div class="guide-num">3</div><div class="guide-text">수정 후 저장하고 <b>GitHub</b> 또는 <b>Netlify Drop</b>에 다시 업로드하면 즉시 반영됩니다.</div></div>`;
  h+=`</div>`;

  h+=`<div class="adm-section"><h3>📊 정답표 (60문항)</h3><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:10px">`;
  ANS.forEach((a,i)=>{
    h+=`<div style="text-align:center;padding:6px 0;background:#0f172a;border-radius:8px;font-size:12px"><span style="color:#64748b">${i+1}.</span> <span style="color:#60a5fa;font-weight:700">${C[a-1]}</span></div>`;
  });
  h+=`</div></div>`;

  document.getElementById("admContent").innerHTML=h;
}

function hideAdmin(){ go("startScreen"); }

function copyText(t){
  navigator.clipboard.writeText(t).then(()=>alert("복사되었습니다!")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("복사되었습니다!");
  });
}
</script>
</body>
</html>
